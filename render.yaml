services:
  # Backend: FastAPI + PostgreSQL + Redis
  - type: web
    name: event-tracker-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: event-tracker-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: event-tracker-redis
          property: connectionString

  # Frontend: Flutter Web (Nginx)
  - type: web
    name: event-tracker-web
    env: static
    buildCommand: "cd frontend && flutter build web --release --web-renderer canvaskit"
    staticPublishPath: frontend/build/web
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: event-tracker-api
          property: url

databases:
  - name: event-tracker-db
    plan: free
    ipAllowList: [] # Дозволити доступ лише внутрішнім сервісам

redis:
  - name: event-tracker-redis
    plan: free
    ipAllowList: []
