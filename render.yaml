services:
  # 1. БЕКЕНД (Python/FastAPI)
  - type: web
    name: event-tracker-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: event-tracker-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. ФРОНТЕНД (Static Site)
  - type: web
    name: event-tracker-web
    env: static
    buildCommand: "cd frontend && flutter build web --release --web-renderer canvaskit"
    staticPublishPath: frontend/build/web

databases:
  - name: event-tracker-db
    plan: free
